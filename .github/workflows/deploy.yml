name: Deploy FoixGrass sur GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.121.1
    steps:
      - name: Installer Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configurer GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Construire le site Hugo
        env:
          HUGO_ENVIRONMENT: production
        # On garde la baseURL "https://foixgrass.com/" du hugo.toml,
        # car le domaine custom est configuré dans static/CNAME.
        run: |
          hugo --minify

      - name: Uploader l'artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
