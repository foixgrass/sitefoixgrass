<style>
/* ═══════════════════════════════════════
   FOIXGRASS — HEADER
   Charte : jaune #F7E600 · rouge #E82000 · bleu #1E3FA8 · noir #1A1A1A
═══════════════════════════════════════ */
* { box-sizing: border-box; }

#site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  width: 100%;
  z-index: 9000;
  background: #F7E600;
  border-bottom: 3px solid #1A1A1A;
  box-shadow: 0 2px 8px rgba(0,0,0,0.22);
}

/* ── DESKTOP ── */
#header-desktop {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
  height: 64px;
}
#header-desktop .hd-brand {
  display: flex; align-items: center; gap: 0.7rem; text-decoration: none;
}
#header-desktop .hd-brand img {
  height: 50px; width: auto; object-fit: contain; flex-shrink: 0;
}
#header-desktop .hd-brand-text { display: flex; flex-direction: column; line-height: 1.1; }
#header-desktop .hd-brand-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.7rem;
  color: #1A1A1A;
  letter-spacing: 0.06em;
}
#header-desktop .hd-brand-sub {
  font-family: 'Inter', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  color: #1A1A1A;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
#header-desktop nav { display: flex; gap: 1.5rem; align-items: center; }
#header-desktop nav a {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  color: #1A1A1A;
  text-decoration: none;
  padding: 4px 0;
  border-bottom: 2px solid transparent;
  transition: color 0.18s, border-color 0.18s;
}
#header-desktop nav a:hover { color: #E82000; border-bottom-color: #E82000; }

/* Bouton billetterie dans la nav */
#header-desktop nav .nav-cta {
  background: #E82000;
  color: #fff !important;
  border: 2px solid #1A1A1A !important;
  padding: 6px 18px !important;
  border-bottom: 2px solid #1A1A1A !important;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.05rem;
  letter-spacing: 0.08em;
  transition: background 0.18s, color 0.18s;
}
#header-desktop nav .nav-cta:hover {
  background: #1A1A1A;
  color: #F7E600 !important;
}

/* ── MOBILE barre ── */
#header-mobile {
  display: none;
  align-items: center;
  justify-content: space-between;
  height: 54px;
  padding: 0 1rem;
}
#hm-burger-btn {
  background: none; border: none; cursor: pointer;
  padding: 6px; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
}
.hm-line {
  display: block; width: 24px; height: 2.5px;
  background: #1A1A1A; border-radius: 1px;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
body.nav-open .hm-line:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
body.nav-open .hm-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
body.nav-open .hm-line:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

#header-mobile .hm-brand {
  display: flex; align-items: center; gap: 8px;
}
#header-mobile .hm-brand img {
  height: 38px; width: auto; object-fit: contain;
}
#header-mobile .hm-brand-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  color: #1A1A1A;
  letter-spacing: 0.06em;
}

/* ── Menu déroulant mobile ── */
#hm-nav {
  position: fixed; top: 0; left: 0;
  height: 100vh; width: 72vw; max-width: 300px;
  background: #1A1A1A;
  z-index: 9100;
  padding: 4.5rem 1.8rem 2rem;
  display: flex; flex-direction: column; gap: 0;
  transform: translateX(-100%);
  transition: transform 0.36s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 4px 0 24px rgba(0,0,0,0.5);
}
#hm-close-btn {
  position: absolute; top: 0.8rem; right: 0.9rem;
  background: none; border: none; cursor: pointer;
  color: #F7E600; font-size: 1.8rem; line-height: 1;
  padding: 4px 8px;
  transition: color 0.2s, transform 0.2s;
}
#hm-close-btn:hover { color: #E82000; transform: scale(1.15); }
#hm-nav.open { transform: translateX(0); }
#hm-nav a {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.08em;
  color: #F7E600;
  text-decoration: none;
  padding: 0.8rem 0;
  border-bottom: 1px solid rgba(247,230,0,0.2);
  display: block;
  transition: color 0.2s, padding-left 0.22s;
}
#hm-nav a:last-child { border-bottom: none; }
#hm-nav a:hover { color: #E82000; padding-left: 0.5rem; }
#hm-nav .nav-cta-mobile {
  margin-top: 1rem;
  background: #E82000;
  color: #fff !important;
  text-align: center;
  padding: 0.7rem 1rem !important;
  border-bottom: none !important;
}
#hm-nav .nav-cta-mobile:hover { background: #F7E600; color: #1A1A1A !important; }

/* Overlay */
#hm-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 9050;
}
#hm-overlay.open { display: block; }

/* Media queries */
@media (min-width: 769px) {
  #header-desktop { display: flex; }
  #header-mobile  { display: none; }
  #site-header { height: 64px; }
}
@media (max-width: 768px) {
  #header-desktop { display: none; }
  #header-mobile  { display: flex; }
  #site-header { height: 54px; }
  #hm-nav { display: flex; }
}
</style>

<div id="site-header">
  <!-- DESKTOP -->
  <div id="header-desktop">
    <a href="{{ .Site.BaseURL }}" class="hd-brand">
      <img src="{{ .Site.BaseURL }}img/logo-foixgrass.jpeg" alt="Logo FoixGrass Festival">
      <div class="hd-brand-text">
        <span class="hd-brand-name">FoixGrass</span>
        <span class="hd-brand-sub">Festival · Ariège · 20–23 Août 2026</span>
      </div>
    </a>
    <nav>
      <a href="#festival">Le Festival</a>
      <a href="#artistes">Artistes</a>
      <a href="#infos">Infos Pratiques</a>
      <a href="#don">Faire un Don</a>
      <a href="#billetterie" class="nav-cta">🎟 Billetterie</a>
    </nav>
  </div>

  <!-- MOBILE barre -->
  <div id="header-mobile">
    <button id="hm-burger-btn" aria-label="Ouvrir le menu">
      <span class="hm-line"></span>
      <span class="hm-line"></span>
      <span class="hm-line"></span>
    </button>
    <div class="hm-brand">
      <img src="{{ .Site.BaseURL }}img/logo-foixgrass.jpeg" alt="FoixGrass">
      <span class="hm-brand-name">FoixGrass</span>
    </div>
  </div>
</div>

<nav id="hm-nav" aria-hidden="true">
  <button id="hm-close-btn" aria-label="Fermer le menu">&#x2715;</button>
  <a href="#festival">Le Festival</a>
  <a href="#artistes">Artistes</a>
  <a href="#infos">Infos Pratiques</a>
  <a href="#don">Faire un Don</a>
  <a href="#billetterie" class="nav-cta-mobile">🎟 Billetterie</a>
</nav>
<div id="hm-overlay"></div>

<script>
(function () {
  var btn      = document.getElementById('hm-burger-btn');
  var closeBtn = document.getElementById('hm-close-btn');
  var nav      = document.getElementById('hm-nav');
  var overlay  = document.getElementById('hm-overlay');
  var links    = nav.querySelectorAll('a');
  function open() {
    nav.classList.add('open'); overlay.classList.add('open');
    document.body.classList.add('nav-open');
    nav.setAttribute('aria-hidden', 'false');
  }
  function close() {
    nav.classList.remove('open'); overlay.classList.remove('open');
    document.body.classList.remove('nav-open');
    nav.setAttribute('aria-hidden', 'true');
  }
  if (btn) btn.addEventListener('click', function () { nav.classList.contains('open') ? close() : open(); });
  if (closeBtn) closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', close);
  links.forEach(function (l) { l.addEventListener('click', close); });
})();
</script>
