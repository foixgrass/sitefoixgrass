<style>
#site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  width: 100%;
  z-index: 9000;
  background-color: #b85042;
  box-shadow: 0 2px 8px rgba(0,0,0,0.28);
}

/* ── DESKTOP ── */
#header-desktop {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0.55rem 2rem;
  height: 60px;
  box-sizing: border-box;
}
#header-desktop .hd-brand {
  display: flex; align-items: center; gap: 0.7rem; text-decoration: none;
}
#header-desktop .hd-brand img {
  height: 46px; width: 46px; object-fit: contain; border-radius: 4px; flex-shrink: 0;
}
#header-desktop .hd-brand-text { display: flex; flex-direction: column; line-height: 1.25; }
#header-desktop .hd-brand-name {
  font-family: 'Abril Fatface', serif; font-size: 1.15rem; color: #fff; letter-spacing: 0.04em; font-weight: 400;
}
#header-desktop .hd-brand-sub {
  font-size: 0.68rem; color: rgba(255,255,255,0.78); letter-spacing: 0.14em;
  text-transform: uppercase; font-family: 'Roboto Slab', serif;
}
#header-desktop nav { display: flex; gap: 2rem; align-items: center; }
#header-desktop nav a {
  font-family: 'Roboto Slab', serif; font-size: 0.92rem; font-weight: 600;
  color: #fff; text-decoration: none; letter-spacing: 0.04em;
  padding-bottom: 2px; border-bottom: 2px solid transparent;
  transition: color 0.18s, border-color 0.18s; display: inline;
}
#header-desktop nav a:hover { color: #ffe8a0; border-bottom-color: #ffe8a0; }

/* ── MOBILE barre ── */
#header-mobile {
  display: none;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  padding: 0 1rem;
  box-sizing: border-box;
}
/* Burger à gauche */
#hm-burger-btn {
  background: none; border: none; cursor: pointer;
  padding: 6px; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
}
.hm-line {
  display: block; width: 24px; height: 2px;
  background: #fff; border-radius: 2px;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
/* Burger → croix quand menu ouvert */
body.nav-open .hm-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
body.nav-open .hm-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
body.nav-open .hm-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* Logo + texte : à droite */
#header-mobile .hm-brand {
  display: flex; align-items: center; gap: 8px;
}
#header-mobile .hm-brand img {
  height: 34px; width: 34px; object-fit: contain; border-radius: 3px; flex-shrink: 0;
}
#header-mobile .hm-brand-text { display: flex; flex-direction: column; line-height: 1.2; }
#header-mobile .hm-brand-name {
  font-family: 'Abril Fatface', serif; font-size: 0.92rem; color: #fff;
}
#header-mobile .hm-brand-sub {
  font-family: 'Roboto Slab', serif; font-size: 0.6rem;
  color: rgba(255,255,255,0.8); letter-spacing: 0.1em; text-transform: uppercase;
}

/* ── Menu déroulant mobile ── */
#hm-nav {
  position: fixed; top: 0; left: 0;
  height: 100vh; width: 72vw; max-width: 280px;
  background-image: url("img/menu-bg.jpg");
  background-size: cover; background-position: center top;
  z-index: 9100;
  padding: 4rem 1.8rem 2rem;
  box-sizing: border-box;
  display: flex; flex-direction: column; gap: 0;
  transform: translateX(-100%);
  transition: transform 0.36s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 4px 0 20px rgba(0,0,0,0.35);
}
/* Bouton croix en haut du menu */
#hm-close-btn {
  position: absolute;
  top: 0.8rem; right: 0.9rem;
  background: none; border: none; cursor: pointer;
  color: #fff; font-size: 1.8rem; line-height: 1;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  padding: 4px 8px;
  transition: color 0.2s, transform 0.2s;
}
#hm-close-btn:hover { color: #ffe8a0; transform: scale(1.15); }
#hm-nav.open { transform: translateX(0); }
#hm-nav a {
  font-family: 'Abril Fatface', serif; font-size: 1.2rem;
  color: #fff; text-decoration: none;
  padding: 0.85rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.25);
  display: block; letter-spacing: 0.03em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  transition: color 0.2s, padding-left 0.22s;
}
#hm-nav a:last-child { border-bottom: none; }
#hm-nav a:hover { color: #ffe8a0; padding-left: 0.5rem; }

/* Overlay */
#hm-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(30,10,0,0.48); z-index: 9050;
}
#hm-overlay.open { display: block; }

/* Media queries */
@media (min-width: 769px) {
  #header-desktop { display: flex; }
  #header-mobile  { display: none; }
  #site-header { height: 60px; }
}
@media (max-width: 768px) {
  #header-desktop { display: none; }
  #header-mobile  { display: flex; }
  #site-header { height: 52px; }
  #hm-nav { display: flex; }
}
</style>

<div id="site-header">
  <!-- DESKTOP -->
  <div id="header-desktop">
    <a href="{{ .Site.BaseURL }}" class="hd-brand">
      <img src="{{ .Site.BaseURL }}img/logo.png" alt="Logo La Remorque">
      <div class="hd-brand-text">
        <span class="hd-brand-name">La Remorque</span>
        <span class="hd-brand-sub">Studio Mobile</span>
      </div>
    </a>
    <nav>
      <a href="#presentation">Présentation</a>
      <a href="#realisations">Réalisations</a>
      <a href="#tarifs">Tarifs</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>

  <!-- MOBILE barre -->
  <div id="header-mobile">
    <button id="hm-burger-btn" aria-label="Ouvrir le menu">
      <span class="hm-line"></span>
      <span class="hm-line"></span>
      <span class="hm-line"></span>
    </button>
    <div class="hm-brand">
      <img src="{{ .Site.BaseURL }}img/logo.png" alt="La Remorque">
      <div class="hm-brand-text">
        <span class="hm-brand-name">La Remorque</span>
        <span class="hm-brand-sub">Studio Mobile</span>
      </div>
    </div>
  </div>
</div>

<nav id="hm-nav" aria-hidden="true">
  <button id="hm-close-btn" aria-label="Fermer le menu">&#x2715;</button>
  <a href="#presentation">Présentation</a>
  <a href="#realisations">Réalisations</a>
  <a href="#tarifs">Tarifs</a>
  <a href="#contact">Contact</a>
</nav>
<div id="hm-overlay"></div>

<script>
(function () {
  var btn     = document.getElementById('hm-burger-btn');
  var closeBtn = document.getElementById('hm-close-btn');
  var nav     = document.getElementById('hm-nav');
  var overlay = document.getElementById('hm-overlay');
  var links   = nav.querySelectorAll('a');
  function open() {
    nav.classList.add('open'); overlay.classList.add('open');
    document.body.classList.add('nav-open');
    nav.setAttribute('aria-hidden', 'false');
    btn.setAttribute('aria-label', 'Fermer le menu');
  }
  function close() {
    nav.classList.remove('open'); overlay.classList.remove('open');
    document.body.classList.remove('nav-open');
    nav.setAttribute('aria-hidden', 'true');
    btn.setAttribute('aria-label', 'Ouvrir le menu');
  }
  if (btn) btn.addEventListener('click', function () { nav.classList.contains('open') ? close() : open(); });
  if (closeBtn) closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', close);
  links.forEach(function (l) { l.addEventListener('click', close); });
})();
</script>
